<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tower Siege</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050d03;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #game-container { position: relative; }
    #slow-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,40,160,0.4) 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="slow-overlay"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
