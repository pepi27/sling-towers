<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Tower Siege</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #050d03;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      position: relative;
      /* scale canvas to fit viewport while keeping 9:16 portrait */
      width: min(100vw, 56.25vh);    /* 56.25 = 720/1280 * 100 */
      height: min(177.78vw, 100vh);  /* 177.78 = 1280/720 * 100 */
    }
    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    #slow-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,40,160,0.4) 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 5;
    }
    #fs-btn {
      position: fixed;
      top: 10px; right: 10px;
      z-index: 99;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 18px;
      width: 36px; height: 36px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      /* hide on desktop where fullscreen isn't needed */
    }
    @media (pointer: fine) { #fs-btn { display: none; } }
  </style>
</head>
<body>
  <button id="fs-btn" title="Fullscreen">⛶</button>
  <div id="game-container">
    <div id="slow-overlay"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/background.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/tower.js"></script>
  <script src="js/projectile.js"></script>
  <script src="js/waves.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
  <script>
    const fsBtn = document.getElementById('fs-btn');
    fsBtn.addEventListener('click', () => {
      const el = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
        fsBtn.textContent = '✕';
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        fsBtn.textContent = '⛶';
      }
    });
    document.addEventListener('fullscreenchange',       () => { if (!document.fullscreenElement)        fsBtn.textContent = '⛶'; });
    document.addEventListener('webkitfullscreenchange', () => { if (!document.webkitFullscreenElement)  fsBtn.textContent = '⛶'; });
  </script>
</body>
</html>
